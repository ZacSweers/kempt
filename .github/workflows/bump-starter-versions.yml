name: Bump starter versions

# Runs weekly. Scrapes the latest ktfmt and gjf releases, edits the version
# constants in `src/commands.rs`, runs the test suite, and opens a PR if
# anything changed. The constants kempt init writes into a fresh
# .kempt.toml track upstream this way without making init a network call.

on:
  schedule:
    - cron: '17 13 * * 1'  # Mondays at 13:17 UTC, off the top of the hour
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest releases
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          KTFMT=$(gh release view --repo facebook/ktfmt --json tagName --jq '.tagName' | sed 's/^v//')
          GJF=$(gh release view --repo google/google-java-format --json tagName --jq '.tagName' | sed 's/^v//')
          echo "ktfmt=$KTFMT" >> "$GITHUB_OUTPUT"
          echo "gjf=$GJF" >> "$GITHUB_OUTPUT"
          echo "Latest ktfmt: $KTFMT"
          echo "Latest gjf:   $GJF"

      - name: Read current values
        id: current
        run: |
          set -euo pipefail
          KTFMT=$(grep -oE 'STARTER_KTFMT_VERSION: &str = "[0-9.]+"' src/commands.rs | grep -oE '[0-9.]+')
          GJF=$(grep -oE 'STARTER_GJF_VERSION: &str = "[0-9.]+"' src/commands.rs | grep -oE '[0-9.]+')
          echo "ktfmt=$KTFMT" >> "$GITHUB_OUTPUT"
          echo "gjf=$GJF" >> "$GITHUB_OUTPUT"

      - name: Decide whether to bump
        id: decide
        run: |
          set -euo pipefail
          title_parts=()
          commit_lines=()
          body_lines=()

          if [ "${{ steps.current.outputs.ktfmt }}" != "${{ steps.latest.outputs.ktfmt }}" ]; then
            title_parts+=("ktfmt ${{ steps.latest.outputs.ktfmt }}")
            commit_lines+=("ktfmt: ${{ steps.current.outputs.ktfmt }} -> ${{ steps.latest.outputs.ktfmt }}")
            body_lines+=("- ktfmt: \`${{ steps.current.outputs.ktfmt }}\` -> \`${{ steps.latest.outputs.ktfmt }}\`")
            body_lines+=("  <https://github.com/facebook/ktfmt/releases>")
          fi

          if [ "${{ steps.current.outputs.gjf }}" != "${{ steps.latest.outputs.gjf }}" ]; then
            title_parts+=("gjf ${{ steps.latest.outputs.gjf }}")
            commit_lines+=("gjf: ${{ steps.current.outputs.gjf }} -> ${{ steps.latest.outputs.gjf }}")
            body_lines+=("- gjf: \`${{ steps.current.outputs.gjf }}\` -> \`${{ steps.latest.outputs.gjf }}\`")
            body_lines+=("  <https://github.com/google/google-java-format/releases>")
          fi

          if [ ${#title_parts[@]} -eq 0 ]; then
            echo "Already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            title="${title_parts[0]}"
            for part in "${title_parts[@]:1}"; do
              title="$title, $part"
            done
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "title=Bump starter versions: $title"
              echo "commit_message<<EOF"
              echo "Bump starter versions"
              echo
              printf '%s\n' "${commit_lines[@]}"
              echo "EOF"
              echo "body<<EOF"
              echo "Automated bump of the versions kempt init writes into a fresh"
              echo '`.kempt.toml`.'
              echo
              printf '%s\n' "${body_lines[@]}"
              echo
              echo "Existing repos with pinned versions are unaffected; this only"
              echo 'changes the values written by `kempt init`.'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Edit constants
        if: steps.decide.outputs.changed == 'true'
        run: |
          set -euo pipefail
          sed -i -E "s/(STARTER_KTFMT_VERSION: &str = \")[0-9.]+(\")/\\1${{ steps.latest.outputs.ktfmt }}\\2/" src/commands.rs
          sed -i -E "s/(STARTER_GJF_VERSION: &str = \")[0-9.]+(\")/\\1${{ steps.latest.outputs.gjf }}\\2/" src/commands.rs

      - uses: dtolnay/rust-toolchain@stable
        if: steps.decide.outputs.changed == 'true'

      - name: Verify
        if: steps.decide.outputs.changed == 'true'
        run: |
          cargo build
          cargo test

      - name: Open PR
        id: cpr
        if: steps.decide.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KEMPT_CREATE_PR_TOKEN || github.token }}
          branch: bump-starter-versions
          base: main
          title: ${{ steps.decide.outputs.title }}
          commit-message: ${{ steps.decide.outputs.commit_message }}
          body: ${{ steps.decide.outputs.body }}
          labels: |
            automated
            dependencies

      - name: Enable auto-merge
        if: steps.decide.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != '' && steps.cpr.outputs.pull-request-operation != 'closed'
        env:
          GH_TOKEN: ${{ secrets.KEMPT_CREATE_PR_TOKEN || github.token }}
        run: |
          gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
